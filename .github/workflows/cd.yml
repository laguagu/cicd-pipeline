name: CD pipeline

on:
  workflow_run:
    workflows: ["CI pipeline"]
    types:
      - completed
jobs:

  build:

    runs-on: self-hosted

    steps:
    - name: Pull docker image
      run: docker pull laguagu/cicd-pipeline:latest
    - name: Delete old docker container
      run: |
        docker rm -f cicd-pipeline-container
        if ($?) { $true } else { $true }
    - name: Run docker container
      run: docker run -d -p 8080:8080 --name cicd-pipeline-container laguagu/cicd-pipeline
      
